<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H3 地理數據可視化</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Login overlay -->
  <div id="login-overlay">
    <div id="login-box">
      <h2>H3 地圖</h2>
      <p id="login-subtitle">請登入以繼續</p>
      <form id="login-form" autocomplete="off">
        <div class="field">
          <label for="l-user">帳號</label>
          <input id="l-user" type="text" autocomplete="username" placeholder="Username" />
        </div>
        <div class="field">
          <label for="l-pass">密碼</label>
          <input id="l-pass" type="password" autocomplete="current-password" placeholder="Password" />
        </div>
        <p id="login-error" class="hidden">帳號或密碼錯誤</p>
        <button type="submit" id="login-submit">登入</button>
      </form>
    </div>
  </div>

  <!-- App (hidden until logged in) -->
  <div id="app" class="hidden">
  <!-- Sidebar -->
  <aside id="sidebar" class="open">
    <div id="sidebar-header">
      <h1>H3 地圖</h1>
      <button id="sidebar-toggle" title="收合側欄">‹</button>
    </div>

    <div id="sidebar-body">
      <label id="upload-btn" class="btn-primary">
        + 上傳 CSV
        <input type="file" id="csv-input" accept=".csv" multiple hidden />
      </label>

      <div id="dataset-list"></div>

      <div id="sidebar-footer">
        <p class="hint">支援欄位：lat/lon、latitude/longitude、lat/lng、y/x</p>
      </div>
    </div>
  </aside>

  <!-- Map -->
  <div id="map"></div>

  <!-- Resolution badge -->
  <div id="res-badge">H3 解析度：<span id="res-value">7</span></div>

  <!-- Tooltip -->
  <div id="tooltip" class="hidden"></div>

  </div><!-- /app -->

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
